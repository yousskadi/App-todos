services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-todos}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?définir POSTGRES_PASSWORD dans .env}
      POSTGRES_DB: ${POSTGRES_DB:-todos}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-todos} -d ${POSTGRES_DB:-todos}"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-todos}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-todos}
      JWT_SECRET: ${JWT_SECRET:?définir JWT_SECRET dans .env}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "127.0.0.1:8000:8000"

  frontend:
    build: ./frontend
    depends_on:
      - backend
    ports:
      - "127.0.0.1:5173:80"

volumes:
  pgdata:
