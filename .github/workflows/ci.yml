name: CI

on:
  push:
    branches: [main]
  pull_request:

# Jeton en lecture seule par défaut ; chaque job élève ses permissions au besoin
permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: todos
          POSTGRES_PASSWORD: todos-ci
          POSTGRES_DB: todos_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U todos -d todos_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/pyproject.toml
      - run: pip install -e ".[dev]"
      - run: ruff check .
      - run: python -m pytest -q
        env:
          TEST_DATABASE_URL: postgresql+asyncpg://todos:todos-ci@localhost:5432/todos_test

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      # inclut le typecheck (tsc -b) avant le bundle
      - run: npm run build

  # Scan de secrets sur tout l'historique git
  gitleaks:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write # commentaire sur la PR si une fuite est détectée
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Audit des dépendances (CVE connues) backend et frontend
  deps:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/pyproject.toml
      - name: pip-audit (backend)
        working-directory: backend
        run: |
          pip install --upgrade pip
          pip install -e . pip-audit
          pip-audit
      - name: npm audit (frontend)
        working-directory: frontend
        run: npm audit --audit-level=high

  e2e:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: todos
          POSTGRES_PASSWORD: todos-ci
          POSTGRES_DB: todos
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U todos -d todos"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/pyproject.toml
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      # Le webServer Playwright lance .venv/bin/uvicorn et lit ../.env
      # (mêmes chemins qu'en local, voir frontend/playwright.config.ts)
      - name: Préparer le backend
        working-directory: backend
        run: |
          python -m venv .venv
          .venv/bin/pip install -e .
          cat > ../.env <<'EOF'
          POSTGRES_USER=todos
          POSTGRES_PASSWORD=todos-ci
          POSTGRES_DB=todos
          JWT_SECRET=secret-ci-uniquement-jamais-en-production
          EOF
          DATABASE_URL=postgresql+asyncpg://todos:todos-ci@localhost:5432/todos \
          JWT_SECRET=secret-ci-uniquement-jamais-en-production \
            .venv/bin/alembic upgrade head

      - name: Préparer le frontend
        working-directory: frontend
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: Tests e2e
        working-directory: frontend
        run: npx playwright test

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: failure()
        with:
          name: playwright-report
          path: frontend/playwright-report
          retention-days: 7

  image:
    # Construit et scanne l'image sur chaque PR ; la publie sur GHCR seulement
    # sur main, une fois les tests verts et le scan Trivy passé
    needs: [backend, e2e]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
      - name: Construire l'image (locale, pour scan)
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: backend
          load: true
          tags: app-todos-backend:ci-scan
      - name: Scan Trivy (bloquant sur CRITICAL/HIGH corrigeables)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: app-todos-backend:ci-scan
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "1"

      - if: github.event_name == 'push'
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - if: github.event_name == 'push'
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ghcr.io/yousskadi/app-todos-backend
          # Tag immuable par SHA de commit, pas de latest flottant (épinglage GitOps)
          tags: type=sha,prefix=sha-,format=short
      - if: github.event_name == 'push'
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: backend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
