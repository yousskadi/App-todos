name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: todos
          POSTGRES_PASSWORD: todos-ci
          POSTGRES_DB: todos_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U todos -d todos_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/pyproject.toml
      - run: pip install -e ".[dev]"
      - run: ruff check .
      - run: python -m pytest -q
        env:
          TEST_DATABASE_URL: postgresql+asyncpg://todos:todos-ci@localhost:5432/todos_test

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      # inclut le typecheck (tsc -b) avant le bundle
      - run: npm run build

  e2e:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: todos
          POSTGRES_PASSWORD: todos-ci
          POSTGRES_DB: todos
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U todos -d todos"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/pyproject.toml
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      # Le webServer Playwright lance .venv/bin/uvicorn et lit ../.env
      # (mêmes chemins qu'en local, voir frontend/playwright.config.ts)
      - name: Préparer le backend
        working-directory: backend
        run: |
          python -m venv .venv
          .venv/bin/pip install -e .
          cat > ../.env <<'EOF'
          POSTGRES_USER=todos
          POSTGRES_PASSWORD=todos-ci
          POSTGRES_DB=todos
          JWT_SECRET=secret-ci-uniquement-jamais-en-production
          EOF
          DATABASE_URL=postgresql+asyncpg://todos:todos-ci@localhost:5432/todos \
          JWT_SECRET=secret-ci-uniquement-jamais-en-production \
            .venv/bin/alembic upgrade head

      - name: Préparer le frontend
        working-directory: frontend
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: Tests e2e
        working-directory: frontend
        run: npx playwright test

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: frontend/playwright-report
          retention-days: 7

  image:
    # Publie l'image du backend seulement sur main, une fois les tests verts
    needs: [backend, e2e]
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/yousskadi/app-todos-backend
          # Tag immuable par SHA de commit, pas de latest flottant (épinglage GitOps)
          tags: type=sha,prefix=sha-,format=short
      - uses: docker/build-push-action@v6
        with:
          context: backend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
